# =============================================================================
# Nginx Configuration for ChordStash (chordstash.cornelltech.ca)
#
# Symlink into sites-enabled:
#   sudo ln -sf /home/administrator/AI/ChordStash/deploy/nginx/chordstash.conf \
#     /etc/nginx/sites-enabled/chordstash
#
# Requires:
#   - oauth2-proxy running on 127.0.0.1:7890
#   - ChordStash node server running on 127.0.0.1:9010
#   - SSL certs (snakeoil initially, certbot replaces them)
#
# Traffic flow:
#   ISPConfig Apache (443) → this nginx (7443) → oauth2-proxy (7890) → app (9010)
#   Static files served publicly; /api/ routes protected by OAuth2.
#   The app JS checks /api/me and shows a login page or the app accordingly.
# =============================================================================

upstream chordstash_backend {
    server 127.0.0.1:9010;
    keepalive 8;
}

# Map forwarded port: use Apache's X-Forwarded-Port if present, else 7443
map $http_x_forwarded_port $chordstash_real_port {
    default $http_x_forwarded_port;
    ""      7443;
}

server {
    listen 7443 ssl http2;
    listen [::]:7443 ssl http2;
    server_name chordstash.cornelltech.ca;

    # SSL - Using self-signed cert initially
    # Certbot will replace: sudo certbot --nginx -d chordstash.cornelltech.ca
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    access_log /var/log/nginx/chordstash_access.log;
    error_log /var/log/nginx/chordstash_error.log;

    # ---- OAuth2 Proxy Endpoints (public) ----

    location /oauth2/ {
        proxy_pass http://127.0.0.1:7890/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $chordstash_real_port;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location = /oauth2/auth {
        internal;
        proxy_pass http://127.0.0.1:7890/oauth2/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $chordstash_real_port;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # ---- API routes: protected by OAuth2 ----

    location /api/ {
        auth_request /oauth2/auth;
        auth_request_set $auth_email $upstream_http_x_auth_request_email;
        auth_request_set $auth_user $upstream_http_x_auth_request_user;

        # On 401, return 401 JSON (app handles login UI)
        error_page 401 = @api_unauthorized;

        proxy_set_header X-Auth-Request-Email $auth_email;
        proxy_set_header X-Auth-Request-User $auth_user;

        proxy_pass http://chordstash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        proxy_read_timeout 60s;
    }

    location @api_unauthorized {
        default_type application/json;
        return 401 '{"error":"unauthorized","authenticated":false}';
    }

    # ---- Static files & SPA: public (no auth) ----

    location / {
        proxy_pass http://chordstash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}
