# =============================================================================
# ISPConfig3 Apache Directives for chordstash.cornelltech.ca
#
# Location: ISPConfig3 > Sites > chordstash.cornelltech.ca > Options > Apache Directives
#
# This proxies from ISPConfig3 (port 443, LetsEncrypt SSL) to the
# AI server (192.168.10.15:7443) which runs nginx with OAuth2-proxy
# protecting ChordStash on port 9010.
#
# Required Apache modules (on ISPConfig3 server):
#   sudo a2enmod proxy proxy_http ssl headers rewrite
#   sudo systemctl restart apache2
# =============================================================================

# Enable SSL proxy to backend (nginx on AI server uses self-signed certs)
SSLProxyEngine On
SSLProxyVerify none
SSLProxyCheckPeerCN off
SSLProxyCheckPeerName off

ProxyPreserveHost On
ProxyRequests Off

# Tell nginx/oauth2-proxy the real public port is 443 (not 7443)
RequestHeader set X-Forwarded-Port "443"
RequestHeader set X-Forwarded-Proto "https"

# OAuth2 endpoints for Google Sign-In
ProxyPass /oauth2 https://192.168.10.15:7443/oauth2
ProxyPassReverse /oauth2 https://192.168.10.15:7443/oauth2

# API endpoints
ProxyPass /api https://192.168.10.15:7443/api
ProxyPassReverse /api https://192.168.10.15:7443/api

# Main application (all other routes)
ProxyPass / https://192.168.10.15:7443/
ProxyPassReverse / https://192.168.10.15:7443/

# Timeout
ProxyTimeout 60
